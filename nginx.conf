server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # kamal-proxy healthcheck. Must return 200 so the deploy is considered live.
    location = /up {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Astro's static export writes pretty URLs as /path/index.html files.
    # try_files lets /docs/guides/foo resolve to /docs/guides/foo/index.html.
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Long-lived caching for fingerprinted asset bundles.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
